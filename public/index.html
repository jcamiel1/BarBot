<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cocktail Recommender</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#07071a;color:#ddd8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(100,60,200,.07) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(60,80,220,.05) 0%,transparent 50%),radial-gradient(ellipse at 50% 90%,rgba(120,40,180,.05) 0%,transparent 55%);pointer-events:none}
#start-screen{text-align:center;padding:48px;animation:fadeIn 1.2s ease;display:flex;flex-direction:column;align-items:center}
.start-logo { height: 140px; width: auto; margin-bottom: 36px; opacity: .85; }
.start-eyebrow{font-size:.7rem;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:#7050bb;margin-bottom:20px}
#start-screen h1{font-family:'Cormorant Garamond',serif;font-size:4.5rem;font-weight:300;color:#ede8ff;letter-spacing:.05em;line-height:1.1;margin-bottom:16px}
#start-screen p{font-size:.875rem;font-weight:300;color:#3d3560;letter-spacing:.08em;margin-bottom:52px}
#begin-btn{background:transparent;color:#a080e8;border:1px solid rgba(140,90,240,.45);padding:14px 52px;font-size:.75rem;font-family:'Inter',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;border-radius:100px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
#begin-btn::before{content:'';position:absolute;inset:0;background:rgba(120,70,220,.1);opacity:0;transition:opacity .3s ease}
#begin-btn:hover::before{opacity:1}
#begin-btn:hover{border-color:rgba(150,100,255,.85);color:#c8aaff}
#begin-btn:disabled{opacity:.35;cursor:not-allowed}
#chat-screen{display:none;width:100vw;height:100vh;flex-direction:row;animation:fadeIn .6s ease}
.chat-sidebar{width:64px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:32px 0;border-right:1px solid rgba(255,255,255,.04)}
.sidebar-logo{height:70px;width:auto;opacity:.28;display:none}
.sidebar-line{width:1px;flex:1;margin:20px 0;background:linear-gradient(to bottom,transparent,rgba(120,80,220,.25),transparent)}
.sidebar-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#28204a;writing-mode:vertical-rl;transform:rotate(180deg)}
.chat-main{flex:1;display:flex;flex-direction:column;max-width:680px;margin:0 auto;padding:32px 40px;height:100vh}
#chat-header{display:flex;align-items:center;gap:14px;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:28px}
.chat-header-logo { height: 80px; width: auto; opacity: .5; flex-shrink: 0; }
#chat-header h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:#ede8ff;letter-spacing:.05em}
#chat-header span{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:#2e265a;margin-left:auto}
#messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:20px;padding-right:8px;scrollbar-width:thin;scrollbar-color:rgba(120,80,220,.15) transparent}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:rgba(120,80,220,.2);border-radius:2px}
.message{max-width:78%;line-height:1.65;font-size:.9rem;font-weight:300;animation:slideUp .3s ease}
.message.agent{align-self:flex-start;color:#ccc4e8;padding:16px 20px;background:rgba(100,70,200,.06);border:1px solid rgba(120,80,220,.12);border-radius:2px 16px 16px 16px;white-space:pre-wrap}
.message.user{align-self:flex-end;color:#ede8ff;background:linear-gradient(135deg,#3d20a0,#5a30c8);padding:12px 20px;border-radius:16px 16px 2px 16px;font-weight:400;box-shadow:0 4px 20px rgba(80,40,200,.3)}
.message.system{align-self:center;color:#28204a;font-size:.75rem;letter-spacing:.08em}
.options-wrap{align-self:flex-start;display:flex;flex-direction:row;flex-wrap:wrap;gap:10px;max-width:90%;animation:slideUp .3s ease}
.option-btn{background:transparent;border:1px solid rgba(120,80,220,.35);color:#8060cc;padding:9px 20px;border-radius:100px;font-family:'Inter',sans-serif;font-size:.8rem;font-weight:400;letter-spacing:.04em;cursor:pointer;transition:all .25s ease;white-space:nowrap}
.option-btn:hover{background:rgba(100,60,200,.12);border-color:rgba(150,100,255,.75);color:#c8aaff}
.option-btn:disabled{opacity:.2;cursor:not-allowed}
.typing{display:flex;gap:6px;align-items:center;padding:16px 20px;align-self:flex-start}
.typing span{width:5px;height:5px;background:#8060cc;border-radius:50%;animation:pulse 1.2s infinite;opacity:.6}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(1);opacity:.4}40%{transform:scale(1.3);opacity:1}}
#input-area { display: none; }
#user-input{flex:1;background:rgba(100,70,200,.05);border:1px solid rgba(120,80,220,.1);color:#ddd8f0;padding:12px 18px;border-radius:100px;font-size:.875rem;font-family:'Inter',sans-serif;font-weight:300;resize:none;outline:none;transition:border-color .2s ease;line-height:1.5}
#user-input::placeholder{color:#28204a}
#user-input:focus{border-color:rgba(120,80,220,.35)}
#send-btn{background:rgba(100,60,200,.18);color:#a080e8;border:1px solid rgba(120,80,220,.3);width:44px;height:44px;border-radius:50%;font-size:1rem;cursor:pointer;transition:all .25s ease;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#send-btn:hover{background:rgba(100,60,200,.32);border-color:rgba(150,100,255,.65)}
#send-btn:disabled{opacity:.25;cursor:not-allowed}
.chat-panel{width:200px;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;border-left:1px solid rgba(255,255,255,.04);gap:40px}
.panel-item{text-align:center}
.panel-item .pi-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#1e1840;margin-bottom:8px}
.panel-item .pi-value{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:#2a2050}
.panel-divider{width:1px;height:40px;background:linear-gradient(to bottom,transparent,rgba(120,80,220,.12),transparent)}
#ticket-overlay{display:none;position:fixed;inset:0;background:rgba(4,3,20,.82);backdrop-filter:blur(8px);align-items:center;justify-content:center;z-index:100;animation:fadeIn .3s ease}
#ticket{background:#0e0c28;border:1px solid rgba(120,80,220,.25);color:#ddd8f0;font-family:'Inter',sans-serif;padding:48px 40px 36px;border-radius:12px;width:360px;text-align:center;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 60px rgba(100,60,200,.1)}
#ticket::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(140,90,255,.6),transparent);border-radius:12px 12px 0 0}
.ticket-logo { height: 90px; width: auto; opacity: .35; margin-bottom: 20px; }
#ticket .ticket-eyebrow{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:#7050bb;margin-bottom:6px}
#ticket h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:#ede8ff;margin-bottom:28px;letter-spacing:.05em}
#ticket .divider{border:none;border-top:1px solid rgba(120,80,220,.15);margin:20px 0}
#ticket .t-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#4a3888;margin-bottom:6px}
#ticket .t-value{font-size:1rem;font-weight:400;color:#ddd8f0;margin-bottom:16px;line-height:1.4}
#ticket .t-notes{font-size:.8rem;color:#6a50a0;font-style:italic}
#ticket .ticket-footer{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:#3a2870;margin-top:8px}
#close-ticket{margin-top:28px;background:transparent;color:#a080e8;border:1px solid rgba(140,90,240,.35);padding:11px 40px;font-size:.7rem;font-family:'Inter',sans-serif;font-weight:500;letter-spacing:.2em;text-transform:uppercase;border-radius:100px;cursor:pointer;transition:all .25s ease}
#close-ticket:hover{background:rgba(100,60,200,.12);border-color:rgba(150,100,255,.6)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.slider-wrap{align-self:flex-start;display:flex;flex-direction:column;gap:14px;width:100%;max-width:100%;animation:slideUp .3s ease;padding:16px 20px;background:rgba(100,70,200,.06);border:1px solid rgba(120,80,220,.12);border-radius:2px 16px 16px 16px;}
.slider-labels{display:flex;justify-content:space-between;font-size:.75rem;color:#8060cc;letter-spacing:.08em}
.slider-value{text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#ede8ff;letter-spacing:.05em;min-height:1.4em}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:2px;background:linear-gradient(90deg,rgba(120,80,220,.3),rgba(150,100,255,.7));border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#3d20a0,#5a30c8);border:2px solid rgba(150,100,255,.8);cursor:pointer;box-shadow:0 2px 8px rgba(80,40,200,.4)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#3d20a0,#5a30c8);border:2px solid rgba(150,100,255,.8);cursor:pointer;box-shadow:0 2px 8px rgba(80,40,200,.4)}
</style>
</head>
<body>
  <div id="start-screen">
  <img class="start-logo" id="logo-start" alt="Bounteous" src="/logo.png"/>
  <div class="start-eyebrow">Est. 2024</div>
  <h1>The Bar</h1>
  <p>Let our sommelier find your perfect drink</p>
  <button id="begin-btn" onclick="beginSession()">Begin</button>
</div>

<div id="chat-screen">
  <div class="chat-sidebar">
    <img class="sidebar-logo" id="logo-sidebar" alt="Bounteous" src="/logo.png"/>
    <div class="sidebar-line"></div>
    <div class="sidebar-label">Sommelier</div>
  </div>
  <div class="chat-main">
    <div id="chat-header">
      <img class="chat-header-logo" id="logo-header" alt="Bounteous" src="/logo.png"/>
      <h2>Cocktail Sommelier</h2>
      <span>Personal Selection</span>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="Or type a note…" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>
  </div>
  <div class="chat-panel">
    <div class="panel-item">
      <div class="pi-label">Spirits</div>
      <div class="pi-value">6 Available</div>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-item">
      <div class="pi-label">Style</div>
      <div class="pi-value">Bespoke</div>
    </div>
    <div class="panel-divider"></div>
    <div class="panel-item">
      <div class="pi-label">Service</div>
      <div class="pi-value">À la carte</div>
    </div>
  </div>
</div>

<div id="ticket-overlay">
  <div id="ticket">
    <img class="ticket-logo" id="logo-ticket" alt="Bounteous" src="/logo.png"/>
    <div class="ticket-eyebrow">Order Confirmed</div>
    <h3>Your Cocktail</h3>
    <div class="divider"></div>
    <div class="t-label">Cocktail</div>
    <div class="t-value" id="ticket-order"></div>
    <div class="t-label">Ingredients</div>
    <div class="t-value" id="ticket-ingredients"></div>
    <div id="ticket-notes-section" style="display:none">
      <div class="divider"></div>
      <div class="t-notes" id="ticket-notes"></div>
    </div>
    <div class="divider"></div>
    <div class="ticket-footer">Thank you — enjoy your drink</div>
    <button id="close-ticket" onclick="closeTicket()">Close</button>
  </div>
</div>
<script>

const BACKEND_URL='/api/cocktail';
let sessionId=null,polling=false,globalLastTs=null;
  
async function beginSession(){
  var btn=document.getElementById('begin-btn');
  btn.disabled=true;btn.textContent='Starting…';
  try{
    var res=await fetch(BACKEND_URL+'/session',{method:'POST'});
    if(!res.ok)throw new Error(await res.text());
    var data=await res.json();
    sessionId=data.session_id;
    document.getElementById('start-screen').style.display='none';
    document.getElementById('chat-screen').style.display='flex';
    await postEvent({type:'user.message',content:[{type:'text',text:'Hello'}]});
    pollEvents();
  }catch(err){
    btn.disabled=false;btn.textContent='Retry';
    addMessage('system','Could not connect. Please try again.');
    console.error(err);
  }
}

async function sendMessage(){
  var input=document.getElementById('user-input');
  var text=input.value.trim();
  if(!text||!sessionId)return;
  input.value='';
  addMessage('user',text);
  setSendDisabled(true);
  disableOptions();
  await postEvent({type:'user.message',content:[{type:'text',text:text}]});
  pollEvents();
}

async function sendOption(number,label){
  addMessage('user',number+'. '+label);
  setSendDisabled(true);
  disableOptions();
  await postEvent({type:'user.message',content:[{type:'text',text:String(number)}]});
  pollEvents();
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}

async function postEvent(event){
  await fetch(BACKEND_URL+'/event',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({session_id:sessionId,event:event})
  });
}

async function pollEvents(){
  if(polling)return;
  polling=true;
  showTyping(true);
  var idle=false,agentText='';
  while(!idle){
    await sleep(1000);
    try{
      var url=BACKEND_URL+'/events?session_id='+sessionId+(globalLastTs?'&after_ts='+encodeURIComponent(globalLastTs):'');
      var res=await fetch(url);
      var data=await res.json();
      for(var i=0;i<(data.events||[]).length;i++){
        var ev=data.events[i];
        if(ev.type==='agent.message'){
          for(var j=0;j<(ev.content||[]).length;j++){
            if(ev.content[j].type==='text')agentText+=ev.content[j].text;
          }
        }
        if(ev.type==='agent.custom_tool_use'&&ev.name==='print_order_ticket'){
          handleTicket(ev.input);
          await postEvent({
            type:'user.custom_tool_result',
            custom_tool_use_id:ev.id,
            content:[{type:'text',text:'Ticket printed successfully.'}],
            is_error:false
          });
        }
        if(ev.type==='session.status_idle'){idle=true;}
      }
      if(data.last_ts)globalLastTs=data.last_ts;
    }catch(err){
      console.error(err);idle=true;
    }
  }
  showTyping(false);
  if(agentText)renderMessage(agentText);
  setSendDisabled(false);
  polling=false;
}

function cleanText(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/__(.*?)__/g,'$1')
    .replace(/_(.*?)_/g,'$1')
    .replace(/^#{1,6}\s/gm,'')
    .trim();
}

function renderMessage(rawText) {
  var text = cleanText(rawText);

  // Detect slider pattern
  if (/Safe\s*◀[—\-]+▶\s*Adventurous/i.test(text) || /Safe\s*[◀<][^\n]*[▶>]\s*Adventurous/i.test(text)) {
    var lines = text.split('\n');
    var questionParts = [];
    for (var i = 0; i < lines.length; i++) {
      if (/Safe/i.test(lines[i]) && /Adventurous/i.test(lines[i])) break;
      questionParts.push(lines[i]);
    }
    var questionText = questionParts.join('\n').trim();
    if (questionText) addMessage('agent', questionText);

    var sliderLabels = ['Safe', 'Cautious', 'Balanced', 'Daring', 'Adventurous'];

    var wrap = document.createElement('div');
    wrap.className = 'slider-wrap';

    var valueDisplay = document.createElement('div');
    valueDisplay.className = 'slider-value';
    valueDisplay.textContent = 'Balanced';

    var labelRow = document.createElement('div');
    labelRow.className = 'slider-labels';
    var leftLabel = document.createElement('span');
    leftLabel.textContent = 'Safe';
    var rightLabel = document.createElement('span');
    rightLabel.textContent = 'Adventurous';
    labelRow.appendChild(leftLabel);
    labelRow.appendChild(rightLabel);

    var slider = document.createElement('input');
    slider.type = 'range';
    slider.min = '0';
    slider.max = '4';
    slider.value = '2';
    slider.oninput = function() {
      valueDisplay.textContent = sliderLabels[parseInt(slider.value)];
    };

    var confirmBtn = document.createElement('button');
    confirmBtn.className = 'option-btn';
    confirmBtn.textContent = '✓ Done';
    confirmBtn.style.alignSelf = 'center';
    confirmBtn.onclick = function() {
      var label = sliderLabels[parseInt(slider.value)];
      addMessage('user', label);
      setSendDisabled(true);
      disableOptions();
      postEvent({ type: 'user.message', content: [{ type: 'text', text: label }] });
      pollEvents();
    };

    wrap.appendChild(valueDisplay);
    wrap.appendChild(slider);
    wrap.appendChild(labelRow);
    wrap.appendChild(confirmBtn);
    document.getElementById('messages').appendChild(wrap);
    document.getElementById('messages').scrollTop = 9999;
    return;
  }

  // Extract all [bracket] tokens from the text
  var bracketOptions = [];
  var bracketRegex = /\[([^\]]+)\]/g;
  var match;
  while ((match = bracketRegex.exec(text)) !== null) {
    bracketOptions.push(match[1]);
  }

  var cleanedText = bracketOptions.length > 0
    ? text.replace(/\[([^\]]+)\]/g, '').replace(/\s+/g, ' ').trim()
    : text;

  var lines = cleanedText.split('\n');
  var questionLines = [], optionLines = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (/^\d+\.\s/.test(line)) { optionLines.push(line); }
    else { questionLines.push(lines[i]); }
  }

  var questionText = questionLines.join('\n').trim();
  if (questionText) addMessage('agent', questionText);

  // Render bracket-style buttons
  if (bracketOptions.length > 0) {
    var wrap = document.createElement('div');
    wrap.className = 'options-wrap';
    var selected = [];

    // Single-select mode: only one bracket option, OR one of the options is "None"
    var hasNone = bracketOptions.indexOf('None') !== -1;
    var isSingleSelect = bracketOptions.length === 1 || hasNone;

    if (isSingleSelect && !hasNone) {
      // True single option — auto-submit on tap
      bracketOptions.forEach(function(label) {
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = label;
        btn.onclick = function() {
          addMessage('user', label);
          setSendDisabled(true);
          disableOptions();
          postEvent({ type: 'user.message', content: [{ type: 'text', text: label }] });
          pollEvents();
        };
        wrap.appendChild(btn);
      });
    } else if (hasNone) {
      // Multi-select with a None escape hatch
      // None auto-submits immediately; others are multi-select with Done
      bracketOptions.forEach(function(label) {
        var btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = label;
        if (label === 'None') {
          btn.onclick = function() {
            addMessage('user', 'None');
            setSendDisabled(true);
            disableOptions();
            postEvent({ type: 'user.message', content: [{ type: 'text', text: 'None' }] });
            pollEvents();
          };
        } else {
          btn.onclick = function() {
            if (btn.dataset.selected === 'true') {
              btn.dataset.selected = 'false';
              btn.style.background = '';
              btn.style.borderColor = '';
              btn.style.color = '';
              selected = selected.filter(function(s) { return s !== label; });
            } else {
              btn.dataset.selected = 'true';
              btn.style.background = 'rgba(100,60,200,0.28)';
              btn.style.borderColor = 'rgba(150,100,255,0.85)';
              btn.style.color = '#c8aaff';
              selected.push(label);
            }
          };
        }
        wrap.appendChild(btn);
      });

      var confirmBtn = document.createElement('button');
      confirmBtn.className = 'option-btn';
      confirmBtn.textContent = '✓ Done';
      confirmBtn.style.marginTop = '8px';
      confirmBtn.onclick = function() {
        if (selected.length === 0) return;
        var txt = selected.join(', ');
        addMessage('user', txt);
        setSendDisabled(true);
        disableOptions();
        postEvent({ type: 'user.message', content: [{ type: 'text', text: txt }] });
        pollEvents();
      };
      wrap.appendChild(confirmBtn);

} else {
      // Single-select if contains "Surprise Me" (naming theme question)
      var isSingleSelectGroup = bracketOptions.indexOf('Surprise Me') !== -1;
      if (isSingleSelectGroup) {
        bracketOptions.forEach(function(label) {
          var btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = label;
          btn.onclick = function() {
            addMessage('user', label);
            setSendDisabled(true);
            disableOptions();
            postEvent({ type: 'user.message', content: [{ type: 'text', text: label }] });
            pollEvents();
          };
          wrap.appendChild(btn);
        });
      } else {
        // Pure multi-select (flavor buttons)
        bracketOptions.forEach(function(label) {
          var btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = label;
          btn.onclick = function() {
            if (btn.dataset.selected === 'true') {
              btn.dataset.selected = 'false';
              btn.style.background = '';
              btn.style.borderColor = '';
              btn.style.color = '';
              selected = selected.filter(function(s) { return s !== label; });
            } else {
              btn.dataset.selected = 'true';
              btn.style.background = 'rgba(100,60,200,0.28)';
              btn.style.borderColor = 'rgba(150,100,255,0.85)';
              btn.style.color = '#c8aaff';
              selected.push(label);
            }
          };
          wrap.appendChild(btn);
        });

        var confirmBtn = document.createElement('button');
        confirmBtn.className = 'option-btn';
        confirmBtn.textContent = '✓ Done';
        confirmBtn.style.marginTop = '8px';
        confirmBtn.onclick = function() {
          if (selected.length === 0) return;
          var txt = selected.join(', ');
          addMessage('user', txt);
          setSendDisabled(true);
          disableOptions();
          postEvent({ type: 'user.message', content: [{ type: 'text', text: txt }] });
          pollEvents();
        };
        wrap.appendChild(confirmBtn);
      }

      var confirmBtn = document.createElement('button');
      confirmBtn.className = 'option-btn';
      confirmBtn.textContent = '✓ Done';
      confirmBtn.style.marginTop = '8px';
      confirmBtn.onclick = function() {
        if (selected.length === 0) return;
        var txt = selected.join(', ');
        addMessage('user', txt);
        setSendDisabled(true);
        disableOptions();
        postEvent({ type: 'user.message', content: [{ type: 'text', text: txt }] });
        pollEvents();
      };
      wrap.appendChild(confirmBtn);
    }

    document.getElementById('messages').appendChild(wrap);
    document.getElementById('messages').scrollTop = 9999;
  }

  // Render numbered buttons (existing logic)
  if (optionLines.length > 0) {
    var wrap2 = document.createElement('div');
    wrap2.className = 'options-wrap';
    for (var k = 0; k < optionLines.length; k++) {
      var m = optionLines[k].match(/^(\d+)\.\s(.+)/);
      if (m) {
        (function(num, lbl) {
          var btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = lbl;
          btn.onclick = function() { sendOption(num, lbl); };
          wrap2.appendChild(btn);
        })(m[1], m[2]);
      }
    }
    document.getElementById('messages').appendChild(wrap2);
    document.getElementById('messages').scrollTop = 9999;
  }
}

function disableOptions(){
  document.querySelectorAll('.option-btn').forEach(function(b){b.disabled=true;});
}

function handleTicket(input){
  document.getElementById('ticket-order').textContent=input.customer_order||'-';
  document.getElementById('ticket-ingredients').textContent=input.ingredients||'-';
  var sec=document.getElementById('ticket-notes-section');
  if(input.notes){
    document.getElementById('ticket-notes').textContent='Note: '+input.notes;
    sec.style.display='block';
  }else{
    sec.style.display='none';
  }
  document.getElementById('ticket-overlay').style.display='flex';
}

function closeTicket(){
  document.getElementById('ticket-overlay').style.display='none';
  sessionId=null;
  polling=false;
  globalLastTs=null;
  document.getElementById('messages').innerHTML='';
  document.getElementById('user-input').value='';
  setSendDisabled(false);
var btn=document.getElementById('begin-btn');
  btn.disabled=false;
  btn.textContent='Begin';
  document.getElementById('chat-screen').style.display='none';
  document.getElementById('start-screen').style.display='block';
}

function addMessage(role,text){
  var div=document.createElement('div');
  div.className='message '+role;
  div.textContent=text;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop=9999;
}

function showTyping(show){
  var t=document.getElementById('typing-indicator');
  if(show&&!t){
    t=document.createElement('div');
    t.id='typing-indicator';
    t.className='message agent typing';
    t.innerHTML='<span></span><span></span><span></span>';
    document.getElementById('messages').appendChild(t);
    document.getElementById('messages').scrollTop=9999;
  }else if(!show&&t){
    t.remove();
  }
}

function setSendDisabled(val){
  document.getElementById('send-btn').disabled=val;
  document.getElementById('user-input').disabled=val;
}

function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
</script>
</body>
</html>
