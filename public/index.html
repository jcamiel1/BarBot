<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocktail Recommender</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #1a0a00; color: #f5e6c8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    #start-screen { text-align: center; padding: 40px; }
    #start-screen h1 { font-size: 2.4rem; color: #f5c842; margin-bottom: 12px; letter-spacing: 2px; }
    #start-screen p { font-size: 1.1rem; color: #c9a97a; margin-bottom: 36px; }
    #begin-btn { background: #f5c842; color: #1a0a00; border: none; padding: 16px 48px; font-size: 1.2rem; font-family: 'Georgia', serif; font-weight: bold; border-radius: 4px; cursor: pointer; letter-spacing: 1px; transition: background 0.2s; }
    #begin-btn:hover { background: #ffd966; }
    #begin-btn:disabled { background: #8a7230; cursor: not-allowed; }
    #chat-screen { display: none; flex-direction: column; width: 100%; max-width: 600px; height: 100vh; padding: 20px; }
    #chat-header { text-align: center; padding-bottom: 16px; border-bottom: 1px solid #3d2200; margin-bottom: 16px; }
    #chat-header h2 { font-size: 1.4rem; color: #f5c842; letter-spacing: 1px; }
    #messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; padding-right: 4px; }
    .message { max-width: 85%; padding: 12px 16px; border-radius: 6px; line-height: 1.6; font-size: 0.97rem; white-space: pre-wrap; }
    .message.agent { background: #2e1500; border: 1px solid #5c3010; align-self: flex-start; color: #f5e6c8; }
    .message.user { background: #f5c842; color: #1a0a00; align-self: flex-end; font-weight: 500; }
    .message.system { background: transparent; color: #8a7250; font-style: italic; font-size: 0.85rem; align-self: center; border: none; padding: 4px 0; }
    .options-wrap { align-self: flex-start; display: flex; flex-direction: column; gap: 8px; max-width: 85%; }
    .option-btn { background: #3d1800; border: 1px solid #f5c842; color: #f5c842; padding: 10px 16px; border-radius: 4px; font-family: 'Georgia', serif; font-size: 0.95rem; cursor: pointer; text-align: left; transition: background 0.2s; }
    .option-btn:hover { background: #5c2800; }
    .option-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .typing span { width: 8px; height: 8px; background: #f5c842; border-radius: 50%; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    #input-area { display: flex; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #3d2200; }
    #user-input { flex: 1; background: #2e1500; border: 1px solid #5c3010; color: #f5e6c8; padding: 12px 14px; border-radius: 4px; font-size: 0.97rem; font-family: 'Georgia', serif; resize: none; outline: none; }
    #user-input:focus { border-color: #f5c842; }
    #send-btn { background: #f5c842; color: #1a0a00; border: none; padding: 12px 24px; font-size: 1rem; font-weight: bold; font-family: 'Georgia', serif; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    #send-btn:hover { background: #ffd966; }
    #send-btn:disabled { background: #8a7230; cursor: not-allowed; }
    #ticket-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
    #ticket { background: #fff; color: #111; font-family: 'Courier New', monospace; padding: 32px 28px; border-radius: 4px; width: 320px; text-align: center; }
    #ticket h3 { font-size: 1.1rem; margin-bottom: 8px; }
    #ticket .divider { border-top: 1px dashed #999; margin: 12px 0; }
    #ticket .label { font-size: 0.75rem; color: #666; text-transform: uppercase; }
    #ticket .value { font-size: 1rem; font-weight: bold; margin-bottom: 8px; }
    #ticket .notes { font-size: 0.85rem; color: #444; }
    #close-ticket { margin-top: 20px; background: #1a0a00; color: #f5c842; border: none; padding: 10px 28px; font-size: 0.95rem; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
<div id="start-screen">
  <h1>🍹 Cocktail Bar</h1>
  <p>Let our sommelier find your perfect drink</p>
  <button id="begin-btn" onclick="beginSession()">Begin</button>
</div>
<div id="chat-screen">
  <div id="chat-header"><h2>🍹 Cocktail Sommelier</h2></div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" rows="2" placeholder="Or type a note..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>
<div id="ticket-overlay">
  <div id="ticket">
    <h3>🍹 ORDER TICKET</h3>
    <div class="divider"></div>
    <div class="label">Cocktail</div>
    <div class="value" id="ticket-order"></div>
    <div class="label">Ingredients</div>
    <div class="value" id="ticket-ingredients"></div>
    <div id="ticket-notes-section">
      <div class="divider"></div>
      <div class="notes" id="ticket-notes"></div>
    </div>
    <div class="divider"></div>
    <div style="font-size:0.75rem;color:#888;">Thank you — enjoy your drink!</div>
    <button id="close-ticket" onclick="closeTicket()">Close</button>
  </div>
</div>
<script>
  const BACKEND_URL = '/api/cocktail';
  let sessionId = null;
  let polling = false;
  let globalLastTs = null;

  async function beginSession() {
    const btn = document.getElementById('begin-btn');
    btn.disabled = true;
    btn.textContent = 'Starting...';
    try {
      const res = await fetch(BACKEND_URL + '/session', { method: 'POST' });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      sessionId = data.session_id;
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      await postEvent({ type: 'user.message', content: [{ type: 'text', text: 'Hello' }] });
      pollEvents();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Retry';
      addMessage('system', 'Could not connect. Please try again.');
      console.error(err);
    }
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text || !sessionId) return;
    input.value = '';
    addMessage('user', text);
    setSendDisabled(true);
    disableOptions();
    await postEvent({ type: 'user.message', content: [{ type: 'text', text: text }] });
    pollEvents();
  }

  async function sendOption(number, label) {
    addMessage('user', number + '. ' + label);
    setSendDisabled(true);
    disableOptions();
    await postEvent({ type: 'user.message', content: [{ type: 'text', text: String(number) }] });
    pollEvents();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function postEvent(event) {
    await fetch(BACKEND_URL + '/event', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId, event: event })
    });
  }

  async function pollEvents() {
    if (polling) return;
    polling = true;
    showTyping(true);
    let idle = false;
    let agentText = '';

    while (!idle) {
      await sleep(1000);
      try {
        const url = BACKEND_URL + '/events?session_id=' + sessionId + (globalLastTs ? '&after_ts=' + encodeURIComponent(globalLastTs) : '');
        const res = await fetch(url);
        const data = await res.json();
        for (var i = 0; i < (data.events || []).length; i++) {
          var ev = data.events[i];
          if (ev.type === 'agent.message') {
            for (var j = 0; j < (ev.content || []).length; j++) {
              if (ev.content[j].type === 'text') agentText += ev.content[j].text;
            }
          }
          if (ev.type === 'agent.custom_tool_use' && ev.name === 'print_order_ticket') {
            handleTicket(ev.input);
            await postEvent({
              type: 'user.custom_tool_result',
              custom_tool_use_id: ev.id,
              content: [{ type: 'text', text: 'Ticket printed successfully.' }],
              is_error: false
            });
          }
          if (ev.type === 'session.status_idle') { idle = true; }
        }
        if (data.last_ts) globalLastTs = data.last_ts;
      } catch (err) {
        console.error(err);
        idle = true;
      }
    }

    showTyping(false);
    if (agentText) renderMessage(agentText);
    setSendDisabled(false);
    polling = false;
  }

  function cleanText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/__(.*?)__/g, '$1')
      .replace(/_(.*?)_/g, '$1')
      .replace(/^#{1,6}\s/gm, '')
      .trim();
  }

  function renderMessage(rawText) {
    var text = cleanText(rawText);
    var lines = text.split('\n');
    var questionLines = [];
    var optionLines = [];

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (/^\d+\.\s/.test(line)) {
        optionLines.push(line);
      } else {
        questionLines.push(lines[i]);
      }
    }

    var questionText = questionLines.join('\n').trim();
    if (questionText) addMessage('agent', questionText);

    if (optionLines.length > 0) {
      var wrap = document.createElement('div');
      wrap.className = 'options-wrap';
      for (var k = 0; k < optionLines.length; k++) {
        var match = optionLines[k].match(/^(\d+)\.\s(.+)/);
        if (match) {
          (function(num, label) {
            var btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = num + '. ' + label;
            btn.onclick = function() { sendOption(num, label); };
            wrap.appendChild(btn);
          })(match[1], match[2]);
        }
      }
      document.getElementById('messages').appendChild(wrap);
      document.getElementById('messages').scrollTop = 9999;
    }
  }

  function disableOptions() {
    var btns = document.querySelectorAll('.option-btn');
    for (var i = 0; i < btns.length; i++) btns[i].disabled = true;
  }

  function handleTicket(input) {
    document.getElementById('ticket-order').textContent = input.customer_order || '-';
    document.getElementById('ticket-ingredients').textContent = input.ingredients || '-';
    var notesSec = document.getElementById('ticket-notes-section');
    if (input.notes) {
      document.getElementById('ticket-notes').textContent = 'Note: ' + input.notes;
      notesSec.style.display = 'block';
    } else {
      notesSec.style.display = 'none';
    }
    document.getElementById('ticket-overlay').style.display = 'flex';
  }

  function closeTicket() {
    document.getElementById('ticket-overlay').style.display = 'none';
  }

  function addMessage(role, text) {
    var div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 9999;
  }

  function showTyping(show) {
    var t = document.getElementById('typing-indicator');
    if (show && !t) {
      t = document.createElement('div');
      t.id = 'typing-indicator';
      t.className = 'message agent typing';
      t.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('messages').appendChild(t);
      document.getElementById('messages').scrollTop = 9999;
    } else if (!show && t) {
      t.remove();
    }
  }

function setSendDisabled(val) {
    document.getElementById('send-btn').disabled = val;
    document.getElementById('user-input').disabled = val;
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
</script>
</body>
</html>
