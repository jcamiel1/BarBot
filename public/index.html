<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cocktail Recommender</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #07071a;
      color: #ddd8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle blue/purple ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(100, 60, 200, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 80, 220, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 90%, rgba(120, 40, 180, 0.05) 0%, transparent 55%);
      pointer-events: none;
    }

    /* ── START SCREEN ── */
    #start-screen {
      text-align: center;
      padding: 48px;
      animation: fadeIn 1.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .start-logo {
      width: 72px;
      height: 72px;
      margin-bottom: 28px;
      /* Replace src below with your actual logo URL */
    }

    .start-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1) opacity(0.85);
    }

    /* Fallback monogram if no logo image */
    .logo-fallback {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 1px solid rgba(150, 100, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: rgba(180, 140, 255, 0.8);
      letter-spacing: 0.05em;
      margin-bottom: 28px;
      background: rgba(100, 60, 200, 0.08);
    }

    .start-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #8060cc;
      margin-bottom: 20px;
    }

    #start-screen h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4.5rem;
      font-weight: 300;
      color: #ede8ff;
      letter-spacing: 0.05em;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    #start-screen p {
      font-size: 0.875rem;
      font-weight: 300;
      color: #3d3560;
      letter-spacing: 0.08em;
      margin-bottom: 52px;
    }

    #begin-btn {
      background: transparent;
      color: #a080e8;
      border: 1px solid rgba(140, 90, 240, 0.45);
      padding: 14px 52px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    #begin-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(120, 70, 220, 0.1);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #begin-btn:hover::before { opacity: 1; }
    #begin-btn:hover { border-color: rgba(150, 100, 255, 0.85); color: #c8aaff; }
    #begin-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── CHAT SCREEN ── */
    #chat-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      flex-direction: row;
      animation: fadeIn 0.6s ease;
    }

    /* Left accent bar */
    .chat-sidebar {
      width: 64px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0;
      border-right: 1px solid rgba(255,255,255,0.04);
    }

    .sidebar-logo {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1) opacity(0.4);
    }

    /* Fallback for sidebar if no logo */
    .sidebar-logo-fallback {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: rgba(140, 100, 220, 0.45);
      letter-spacing: 0.05em;
    }

    .sidebar-line {
      width: 1px;
      flex: 1;
      margin: 20px 0;
      background: linear-gradient(to bottom, transparent, rgba(120, 80, 220, 0.25), transparent);
    }

    .sidebar-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #28204a;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }

    /* Main chat area */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 40px;
      height: 100vh;
    }

    #chat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      margin-bottom: 28px;
    }

    .chat-header-logo {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .chat-header-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1) opacity(0.6);
    }

    .chat-header-logo-fallback {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: rgba(160, 120, 255, 0.6);
    }

    #chat-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: #ede8ff;
      letter-spacing: 0.05em;
    }

    #chat-header span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2e265a;
      margin-left: auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-right: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(120, 80, 220, 0.15) transparent;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: rgba(120, 80, 220, 0.2); border-radius: 2px; }

    .message {
      max-width: 78%;
      line-height: 1.65;
      font-size: 0.9rem;
      font-weight: 300;
      animation: slideUp 0.3s ease;
    }

    .message.agent {
      align-self: flex-start;
      color: #ccc4e8;
      padding: 16px 20px;
      background: rgba(100, 70, 200, 0.06);
      border: 1px solid rgba(120, 80, 220, 0.12);
      border-radius: 2px 16px 16px 16px;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      color: #ede8ff;
      background: linear-gradient(135deg, #3d20a0, #5a30c8);
      padding: 12px 20px;
      border-radius: 16px 16px 2px 16px;
      font-weight: 400;
      box-shadow: 0 4px 20px rgba(80, 40, 200, 0.3);
    }

    .message.system {
      align-self: center;
      color: #28204a;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }

    /* Option pills */
    .options-wrap {
      align-self: flex-start;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 90%;
      animation: slideUp 0.3s ease;
    }

    .option-btn {
      background: transparent;
      border: 1px solid rgba(120, 80, 220, 0.35);
      color: #8060cc;
      padding: 9px 20px;
      border-radius: 100px;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .option-btn:hover {
      background: rgba(100, 60, 200, 0.12);
      border-color: rgba(150, 100, 255, 0.75);
      color: #c8aaff;
    }

    .option-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 16px 20px;
      align-self: flex-start;
    }

    .typing span {
      width: 5px;
      height: 5px;
      background: #8060cc;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
      opacity: 0.6;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    /* Input area */
    #input-area {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: rgba(100, 70, 200, 0.05);
      border: 1px solid rgba(120, 80, 220, 0.1);
      color: #ddd8f0;
      padding: 12px 18px;
      border-radius: 100px;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      resize: none;
      outline: none;
      transition: border-color 0.2s ease;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #28204a; }
    #user-input:focus { border-color: rgba(120, 80, 220, 0.35); }

    #send-btn {
      background: rgba(100, 60, 200, 0.18);
      color: #a080e8;
      border: 1px solid rgba(120, 80, 220, 0.3);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #send-btn:hover {
      background: rgba(100, 60, 200, 0.32);
      border-color: rgba(150, 100, 255, 0.65);
    }

    #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* Right decorative panel */
    .chat-panel {
      width: 200px;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      border-left: 1px solid rgba(255,255,255,0.04);
      gap: 40px;
    }

    .panel-item {
      text-align: center;
    }

    .panel-item .pi-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #1e1840;
      margin-bottom: 8px;
    }

    .panel-item .pi-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 300;
      color: #2a2050;
    }

      width: 1px;
      height:
