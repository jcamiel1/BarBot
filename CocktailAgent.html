<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cocktail Recommender</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', serif;
      background: #1a0a00;
      color: #f5e6c8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #d4a843; }
    #subtitle { font-size: 0.9rem; color: #a08060; margin-bottom: 24px; }
    #chat {
      width: 100%;
      max-width: 600px;
      background: #2a1505;
      border-radius: 12px;
      padding: 20px;
      min-height: 300px;
      max-height: 60vh;
      overflow-y: auto;
      margin-bottom: 16px;
      border: 1px solid #5a3010;
    }
    .msg { margin-bottom: 14px; line-height: 1.5; }
    .msg.agent  { color: #f5e6c8; }
    .msg.user   { color: #d4a843; text-align: right; font-style: italic; }
    .msg.system { color: #a08060; font-size: 0.85rem; text-align: center; }
    #buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-width: 600px;
      width: 100%;
      margin-bottom: 12px;
    }
    button {
      background: #d4a843;
      color: #1a0a00;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      flex: 1;
      min-width: 100px;
      touch-action: manipulation;
    }
    button:hover  { background: #e8bf6a; }
    button:active { background: #b8922e; }
    button:disabled { background: #5a3010; color: #a08060; cursor: not-allowed; }
    #status {
      font-size: 0.8rem;
      color: #a08060;
      max-width: 600px;
      text-align: center;
      margin-bottom: 12px;
    }
    #begin-wrap {
      max-width: 600px;
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }
    #begin-btn {
      font-size: 1.4rem;
      padding: 20px 60px;
      border-radius: 12px;
      flex: none;
    }
  </style>
</head>
<body>
  <h1>🍹 Cocktail Bar</h1>
  <p id="subtitle">Let us craft your perfect drink</p>
  <div id="chat"></div>
  <div id="begin-wrap">
    <button id="begin-btn" onclick="onBegin()">🍹 Begin</button>
  </div>
  <div id="buttons"></div>
  <div id="status"></div>

  <script>
    const API_BASE = window.location.origin + '/v1';
    const AGENT_ID = 'agt_01PG4WqkBHrdAd2fR1PZoqjk';
    const ENV_ID   = 'env_017SzWsnyUrrCJMjmccoCpt3';

    let sessionId   = null;
    let polling     = false;
    let lastEventId = null;
    let sessionReady = false;

    const chat      = document.getElementById('chat');
    const buttons   = document.getElementById('buttons');
    const status    = document.getElementById('status');
    const beginWrap = document.getElementById('begin-wrap');
    const beginBtn  = document.getElementById('begin-btn');

    function addMsg(text, role = 'agent') {
      const d = document.createElement('div');
      d.className = `msg ${role}`;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
    }

    function setStatus(s) { status.textContent = s; }

    function hideBegin() {
      beginWrap.style.display = 'none';
    }

    function renderButtons(text, onSelect) {
      buttons.innerHTML = '';
      const optionRe = /([A-G\d])\)\s+([^\n]+)/g;
      const opts = [...text.matchAll(optionRe)];
      if (opts.length === 0) return;
      opts.forEach(([, key, label]) => {
        const btn = document.createElement('button');
        btn.textContent = `${key}) ${label.trim()}`;
        btn.onclick = () => { clearButtons(); onSelect(key); };
        buttons.appendChild(btn);
      });
    }

    function clearButtons() { buttons.innerHTML = ''; }

    async function apiCall(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(`${API_BASE}${path}`, opts);
      return res.json();
    }

    async function sendEvent(type, payload = {}) {
      await apiCall(`/sessions/${sessionId}/events`, 'POST', {
        events: [{ type, ...payload }],
      });
    }

    async function pollEvents() {
      if (polling) return;
      polling = true;
      try {
        const url = `/sessions/${sessionId}/events` + (lastEventId ? `?after_id=${lastEventId}` : '');
        const data = await apiCall(url);
        const evts = data.data ?? [];

        for (const ev of evts) {
          lastEventId = ev.id;

          if (ev.type === 'agent.message' && ev.content) {
            const text = ev.content.map(b => b.text ?? '').join('');
            if (text) {
              addMsg(text, 'agent');
              renderButtons(text, sendUserMessage);
            }
          }

          if (ev.type === 'agent.custom_tool_use' && ev.name === 'print_order_ticket') {
            printTicket(ev.input ?? {});
            await sendEvent('user.custom_tool_result', {
              custom_tool_use_id: ev.id,
              content: [{ type: 'text', text: 'Ticket printed successfully.' }],
              is_error: false,
            });
          }

          if (ev.type === 'session.status_idle') {
            setStatus('Waiting for your selection…');
            polling = false;
            return;
          }
          if (ev.type === 'session.status_running') {
            setStatus('Crafting your recommendation…');
          }
        }
      } catch (e) {
        setStatus('Connection error — retrying…');
      }
      polling = false;
      setTimeout(pollEvents, 800);
    }

    function printTicket(inp) {
      console.log('PRINT TICKET', inp);
      addMsg(
        `🖨️ Order sent to printer — ${inp.customer_order} | ${inp.ingredients}${inp.notes ? ' | ' + inp.notes : ''}`,
        'system'
      );
      addMsg('✅ Enjoy your drink! Starting over in 5 seconds…', 'system');
      let countdown = 5;
      const timer = setInterval(() => {
        countdown--;
        setStatus(`New customer starting in ${countdown}…`);
        if (countdown <= 0) {
          clearInterval(timer);
          location.reload();
        }
      }, 1000);
    }

    async function sendUserMessage(text) {
      addMsg(text, 'user');
      setStatus('Crafting your recommendation…');
      clearButtons();
      await sendEvent('user.message', {
        content: [{ type: 'text', text }],
      });
      setTimeout(pollEvents, 600);
    }

    async function onBegin() {
      hideBegin();
      setStatus('Starting…');
      // If session isn't ready yet, wait for it
      if (!sessionReady) {
        setStatus('Just a moment…');
        await new Promise(resolve => {
          const check = setInterval(() => {
            if (sessionReady) { clearInterval(check); resolve(); }
          }, 200);
        });
      }
      await sendUserMessage('Begin');
    }

    // Pre-create the session silently on page load
    async function init() {
      try {
        const sess = await apiCall('/sessions', 'POST', {
          agent:          AGENT_ID,
          environment_id: ENV_ID,
        });
        sessionId   = sess.id;
        sessionReady = true;
        setStatus('Tap Begin to get started!');
      } catch (e) {
        setStatus('Failed to connect. Please refresh the page.');
        console.error(e);
        // Re-show begin as a retry button
        beginBtn.textContent = '🔄 Retry';
        beginBtn.onclick = () => location.reload();
      }
    }

    init();
  </script>
</body>
</html>
